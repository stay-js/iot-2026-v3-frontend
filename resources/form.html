<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
  <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Új IoT eszköz rögzítése</h2>

  <form class="space-y-5">
    <div>
      <label for="manufacturer" class="block text-sm font-medium text-gray-700 mb-1">Gyártó</label>
      <input
        type="text"
        id="manufacturer"
        class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all"
        placeholder="Pl.: Bosch, Honeywell"
      />
    </div>

    <div>
      <label for="product_name" class="block text-sm font-medium text-gray-700 mb-1"
        >Termék neve</label
      >
      <input
        type="text"
        id="product_name"
        class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all"
        placeholder="Pl.: BME280 Hőmérséklet érzékelő"
      />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label for="type_id" class="block text-sm font-medium text-gray-700 mb-1"
          >Eszköz típusa</label
        >
        <select
          id="type_id"
          class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all bg-white"
        >
          <option value="" disabled selected>Válasszon típust...</option>
        </select>
      </div>

      <div>
        <label for="stock" class="block text-sm font-medium text-gray-700 mb-1">Készlet (db)</label>
        <input
          type="number"
          id="stock"
          class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all"
        />
      </div>
    </div>

    <div>
      <label for="price" class="block text-sm font-medium text-gray-700 mb-1">Egységár (Ft)</label>
      <div class="relative">
        <input
          type="number"
          id="price"
          class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all"
        />
        <span class="absolute right-3 top-2.5 text-gray-500">Ft</span>
      </div>
    </div>

    <div class="flex items-center justify-end space-x-4 pt-4">
      <button
        type="submit"
        class="px-6 py-2.5 bg-sky-700 text-white font-semibold rounded-lg hover:bg-sky-800 focus:ring-4 focus:ring-sky-200 transition-all shadow-sm"
      >
        Termék létrehozása
      </button>
    </div>
  </form>
</div>
