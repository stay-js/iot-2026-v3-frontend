server {

    server_name frontend.vm1.test frontend.vm2.test frontend.vm3.test frontend.vm4.test frontend.vm5.test frontend.vm6.test;
    listen 80;

     location / {
        proxy_pass http://frontend:3000/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;

        error_page 502 /502.html;
    }

    location = /502.html {
        internal;
        default_type text/html;
        charset utf-8;
        return 502 '<html><body><h1>Fut a Frontend?</h1></body></html>';
    }
}
